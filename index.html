<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bleati</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#enterScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
  cursor: pointer;
}

#main {
  display: none;
  opacity: 0;
  transition: opacity 1s ease;
}

#main.show {
  display: block;
  opacity: 1;
}

#bleati {
  position: absolute;
  top: 15px;
  left: 20px;
  font-size: 18px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: 0.25s ease;
  z-index: 2;
}

#bleati:hover {
  transform: translateY(-3px);
  text-shadow: 0 0 12px rgba(255,0,0,0.6);
  filter: brightness(1.3);
}

.center {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 2;
  position: relative;
}

.hover-item {
  transition: 0.25s ease;
  cursor: pointer;
}

.hover-item:hover {
  transform: translateY(-4px) scale(1.03);
  text-shadow: 0 0 10px rgba(255,0,0,0.4);
  filter: brightness(1.2);
}

/* RED FOG BACKGROUND */
.fog {
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle at center, rgba(255,0,0,0.15), transparent 70%);
  animation: fogMove 20s linear infinite;
  z-index: 0;
}

.fog2 {
  animation-direction: reverse;
  opacity: 0.6;
  animation-duration: 30s;
}

@keyframes fogMove {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(50px, -50px) scale(1.1); }
  100% { transform: translate(0,0) scale(1); }
}

#music {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="enterScreen"></div>

<div id="main">
  <div class="fog"></div>
  <div class="fog fog2"></div>

  <div id="bleati" class="hover-item">BLEATI</div>

  <div class="center">
    <h1 class="hover-item">welcome</h1>
  </div>

  <iframe
    id="music"
    src="https://www.youtube.com/embed/01ynkBWYkzY?autoplay=1&mute=1"
    allow="autoplay">
  </iframe>
</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const main = document.getElementById("main");
const music = document.getElementById("music");

enterScreen.onclick = () => {
  enterScreen.style.display = "none";
  main.classList.add("show");
  music.src = music.src.replace("mute=1", "mute=0");
};
</script>

</body>
</html>
