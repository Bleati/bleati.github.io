<!DOCTYPE html>
<html>
<head>
<title>bleati</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #050505;
  color: #eee;
  font-family: 'Special Elite', monospace;
  overflow: hidden;
}

#site {
  display: none;
}

/* BLACK CLICK SCREEN */
#enterScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100%;
  background: #0a0a0a;
  border-right: 1px solid #300;
  padding: 20px;
  z-index: 2;
}

.logo {
  font-family: 'UnifrakturCook', cursive;
  color: #ff1a1a;
  font-size: 42px;
}

.menu a {
  display: block;
  color: #bbb;
  text-decoration: none;
  margin: 12px 0;
  transition: 0.2s;
}

.menu a:hover {
  color: #ff2e2e;
  transform: translateX(5px);
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 40px;
  position: relative;
  z-index: 2;
}

.paper {
  background: #f5f1e6;
  color: #111;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
  transform: rotate(-1deg);
}

/* RED FOG */
.fog {
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 70%);
  animation: fogMove 25s linear infinite;
  z-index: 0;
}

.fog2 {
  animation-direction: reverse;
  opacity: 0.5;
  animation-duration: 35s;
}

@keyframes fogMove {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(60px, -40px) scale(1.1); }
  100% { transform: translate(0,0) scale(1); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 1;
}

/* HIDDEN PLAYER */
#ytplayer {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
}
</style>
</head>

<body>

<div id="enterScreen"></div>

<iframe
  id="ytplayer"
  src="https://www.youtube.com/embed/PHJXuXp9R0k?enablejsapi=1&autoplay=1&mute=1"
  allow="autoplay">
</iframe>

<div id="site">

  <div class="fog"></div>
  <div class="fog fog2"></div>

  <canvas id="bg"></canvas>

  <div class="sidebar">
    <div class="logo">bleati</div>
    <div class="menu">
      <a href="index.html">home</a>
      <a href="about.html">about</a>
      <a href="gallery.html">gallery</a>
    </div>
  </div>

  <div class="main">
    <div class="paper">
      <h2>♡ welcome ♡</h2>
      <p>lost little lamb wandering the web. stay a while.</p>
    </div>
  </div>

</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const site = document.getElementById("site");
const player = document.getElementById("ytplayer");

enterScreen.onclick = () => {
  enterScreen.style.display = "none";
  site.style.display = "block";

  player.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
  player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');

  startSymbols();
};

function startSymbols() {
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let symbols = ["✝","✦","☾","⛧"];

  let particles = Array.from({length: 40}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    speed: Math.random()*0.5 + 0.2,
    symbol: symbols[Math.floor(Math.random()*symbols.length)]
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(255,0,0,0.7)";
    ctx.font = "20px serif";

    particles.forEach(p => {
      ctx.fillText(p.symbol, p.x, p.y);
      p.y += p.speed;
      if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
