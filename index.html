<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bleati</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* ===== ENTER SCREEN ===== */
#enterScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

#enterBtn {
  padding: 12px 24px;
  border: 1px solid rgba(255,0,0,0.4);
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.25s ease;
}

#enterBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

/* ===== MAIN CONTENT ===== */
#main {
  display: none;
}

/* ===== TOP LEFT LOGO ===== */
#bleati {
  position: absolute;
  top: 15px;
  left: 20px;
  font-size: 18px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: 0.25s ease;
}

#bleati:hover {
  transform: translateY(-3px);
  text-shadow: 0 0 12px rgba(255,0,0,0.5);
  filter: brightness(1.3);
}

/* ===== CENTER CONTENT ===== */
.center {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* ===== HOVER ITEMS ===== */
.hover-item {
  transition: 0.25s ease;
  cursor: pointer;
}

.hover-item:hover {
  transform: translateY(-4px) scale(1.03);
  text-shadow: 0 0 10px rgba(255,0,0,0.35);
  filter: brightness(1.2);
}

/* ===== HIDDEN YOUTUBE PLAYER ===== */
#music {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- ENTER SCREEN -->
<div id="enterScreen">
  <button id="enterBtn">ENTER</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">

  <div id="bleati" class="hover-item">BLEATI</div>

  <div class="center">
    <h1 class="hover-item">welcome</h1>
  </div>

  <!-- MUSIC (YouTube embed) -->
  <iframe
    id="music"
    src="https://www.youtube.com/embed/01ynkBWYkzY?autoplay=1&mute=1"
    allow="autoplay">
  </iframe>

</div>

<script>
const enterScreen = document.getElementById("enterScreen");
const main = document.getElementById("main");
const enterBtn = document.getElementById("enterBtn");
const music = document.getElementById("music");

enterBtn.onclick = () => {
  enterScreen.style.display = "none";
  main.style.display = "block";

  // try to unmute after user interaction
  music.src = music.src.replace("mute=1", "mute=0");
};
</script>

</body>
</html>
