<!DOCTYPE html>
<html>
<head>
<title>bleati</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #050505;
  color: #eee;
  font-family: 'Special Elite', monospace;
  overflow: hidden;
}

#site {
  display: none;
}

#enterScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

#enterBtn {
  background: transparent;
  color: #ff1a1a;
  border: 1px solid #ff1a1a;
  padding: 18px 40px;
  font-size: 20px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: 0.25s ease;
}

#enterBtn:hover {
  background: #ff1a1a;
  color: black;
  box-shadow: 0 0 20px rgba(255,0,0,0.5);
  transform: scale(1.05);
}

.sidebar {
  position: fixed;
  width: 220px;
  height: 100%;
  background: #0a0a0a;
  border-right: 1px solid #300;
  padding: 20px;
  z-index: 2;
}

.logo {
  font-family: 'UnifrakturCook', cursive;
  color: #ff1a1a;
  font-size: 42px;
}

.menu a {
  display: block;
  color: #bbb;
  text-decoration: none;
  margin: 12px 0;
  transition: 0.2s;
}

.menu a:hover {
  color: #ff2e2e;
  transform: translateX(5px);
}

.main {
  margin-left: 240px;
  padding: 40px;
  position: relative;
  z-index: 2;
}

.paper {
  background: #f5f1e6;
  color: #111;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
  transform: rotate(-1deg);
}

.fog {
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, rgba(80,0,0,0.12), rgba(0,0,0,0.9) 70%);
  animation: fogMove 25s linear infinite;
  z-index: 0;
}

.fog2 {
  animation-direction: reverse;
  opacity: 0.4;
  animation-duration: 35s;
}

@keyframes fogMove {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(60px, -40px) scale(1.1); }
  100% { transform: translate(0,0) scale(1); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 1;
}
</style>
</head>

<body>

<div id="enterScreen">
  <button id="enterBtn">ENTER</button>
</div>

<div id="site">

  <div class="fog"></div>
  <div class="fog fog2"></div>

  <canvas id="bg"></canvas>

  <div class="sidebar">
    <div class="logo">bleati</div>
    <div class="menu">
      <a href="index.html">home</a>
      <a href="about.html">about</a>
      <a href="gallery.html">gallery</a>
    </div>
  </div>

  <div class="main">
    <div class="paper">
      <h2>♡ welcome ♡</h2>
      <p>lost little lamb wandering the web. stay a while.</p>
    </div>
  </div>

</div>

<script>
const enterBtn = document.getElementById("enterBtn");
const enterScreen = document.getElementById("enterScreen");
const site = document.getElementById("site");

enterBtn.onclick = () => {
  enterScreen.style.display = "none";
  site.style.display = "block";
  startSymbols();
};

function startSymbols() {
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let symbols = ["✝","✦","☾","⛧"];

  let particles = Array.from({length: 40}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    speed: Math.random()*0.5 + 0.2,
    symbol: symbols[Math.floor(Math.random()*symbols.length)]
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(255,0,0,0.7)";
    ctx.font = "20px serif";

    particles.forEach(p => {
      ctx.fillText(p.symbol, p.x, p.y);
      p.y += p.speed;
      if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
